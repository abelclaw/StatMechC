<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gas Expansion: Isothermal, Adiabatic, and Free</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#1a1a1e;display:flex;flex-direction:column;align-items:center;
       font-family:'Georgia',serif;color:#ccc;padding:4px 0;margin:0}
  canvas{border-radius:4px;display:block;cursor:pointer;max-width:100%;}
  #canvasWrap{position:relative;display:inline-block}
  #overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;
           align-items:center;justify-content:center;background:rgba(0,0,0,.4);
           cursor:pointer;z-index:10;border-radius:4px}
  #overlay span{font-size:22px;color:#fff;background:rgba(0,0,0,.5);padding:12px 30px;
                border-radius:8px;letter-spacing:2px}
  .ctrls{margin-top:10px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;justify-content:center}
  .ctrls button{background:#444;color:#ddd;border:1px solid #666;padding:6px 16px;
                border-radius:4px;cursor:pointer;font-family:inherit;font-size:.85em}
  .ctrls button:hover{background:#555}
  .ctrls button.active{background:#c55;border-color:#e77}
  .ctrls label{font-size:.8em;color:#999}
  .ctrls input[type=range]{width:110px;accent-color:#e90}
  .info{margin-top:6px;font-size:.72em;color:#666;max-width:900px;text-align:center;line-height:1.5}
</style>
</head>
<body>
<div id="canvasWrap">
<canvas id="c" width="900" height="550"></canvas>
<div id="overlay" onclick="init()"><span>&#9654; Click to start</span></div>
</div>
<div class="ctrls">
  <button id="btnIso" onclick="selectMode('isothermal')">Isothermal</button>
  <button id="btnAdi" onclick="selectMode('adiabatic')">Adiabatic</button>
  <button id="btnFree" onclick="selectMode('free')">Free Expansion</button>
  <span style="color:#555">|</span>
  <button id="btnExpand" onclick="startExpansion()">Expand</button>
  <button id="btnReset" onclick="resetSim()">Reset</button>
  <span style="color:#555">|</span>
  <label>Speed: <input type="range" id="spd" min="0.2" max="6" step="0.1" value="0.5"></label>
</div>
<div class="info">
  Isothermal: heat flows in from the bath, keeping T constant; maximum work extracted.
  Adiabatic: no heat exchange; gas cools as it works against the piston.
  Free expansion: gas rushes into vacuum; no work done, entropy increases.
</div>
<script>
const C = document.getElementById('c'), X = C.getContext('2d');
const W = 900, H = 550;

/* ---- PHYSICS CONSTANTS ---- */
const GAMMA = 5/3;
const V1 = 1, V2 = 3;
const T0 = 1, P0 = T0 / V1;
const NUM_PARTICLES = 160;
const PARTICLE_R = 2.5;
const BASE_SPEED = 5.5;
const PISTON_MASS = 500;
const PISTON_DAMPING = 0.96;

/* ---- STATE ---- */
let mode = 'isothermal';
let expanding = false;
let done = false;
let progress = 0;
let started = false;
let speed = 1;
let pvPath = [];
let particles = [];

/* Piston physics state */
let pistonY, pistonVy;
let extForce;
let extForceInitial, extForceFinal;
let expansionFrac = 0;
let targetSpeedSq;

/* Derived state at current progress */
let curV, curP, curT, curW, curDS;

/* ---- GEOMETRY ---- */
const CYL = {
  cx: 670, w: 160, wallThick: 14,
  topY: 60, baseY: 460, baseH: 20
};
const cylInterior = CYL.baseY - CYL.topY;
const gasHeightV1 = cylInterior / 3;
const gasHeightV2 = cylInterior;
const pistonMaxY = CYL.baseY - gasHeightV1; // V1: piston low, small gas volume
const pistonMinY = CYL.topY;                // V2: piston at top, full volume
const pistonH = 16;
const rodW = 10;
const weightW = 60, weightH = 40;

const PV = { x: 30, y: 40, w: 360, h: 280 };
const ST = { x: 30, y: 350 };

/* ---- UTILITY ---- */
function currentGasHeight() {
  return CYL.baseY - (pistonY + pistonH);
}

function calcEqForce(gasH, spdSq) {
  // 2D kinetic theory: force on piston = N * m * <vy^2> / h
  // With equipartition <vy^2> = spdSq / 2
  if (gasH < 5) gasH = 5;
  return NUM_PARTICLES * spdSq / (2 * gasH);
}

function measureSpeedSq() {
  let sum = 0;
  for (let p of particles) sum += p.vx * p.vx + p.vy * p.vy;
  return particles.length > 0 ? sum / particles.length : BASE_SPEED * BASE_SPEED;
}

function getPistonY(prog) {
  return pistonMaxY + (pistonMinY - pistonMaxY) * prog;
}

function tempColor(t) {
  const ratio = Math.max(0, Math.min(1, t / T0));
  const r = Math.round(60 + 195 * ratio);
  const g = Math.round(60 + 80 * ratio);
  const b = Math.round(60 + 195 * (1 - ratio));
  return `rgb(${r},${g},${b})`;
}

/* ---- PARTICLE SYSTEM ---- */
function createParticles() {
  particles = [];
  const left = CYL.cx - CYL.w / 2 + PARTICLE_R + 3;
  const right = CYL.cx + CYL.w / 2 - PARTICLE_R - 3;
  const top = pistonY + pistonH + PARTICLE_R + 3;
  const bot = CYL.baseY - PARTICLE_R - 3;
  for (let i = 0; i < NUM_PARTICLES; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = BASE_SPEED * (0.5 + Math.random());
    particles.push({
      x: left + Math.random() * (right - left),
      y: top + Math.random() * (bot - top),
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      r: PARTICLE_R + (Math.random() - 0.5) * 0.8
    });
  }
  targetSpeedSq = BASE_SPEED * BASE_SPEED;
}

/* ---- THERMODYNAMICS (analytical, for readout & PV curve) ---- */
function computeState(prog) {
  const v = V1 + (V2 - V1) * prog;
  let T, P, Wk, dS;
  if (mode === 'isothermal') {
    T = T0; P = T0 / v;
    Wk = T0 * Math.log(v / V1);
    dS = Math.log(v / V1);
  } else if (mode === 'adiabatic') {
    const gm1 = GAMMA - 1;
    T = T0 * Math.pow(V1 / v, gm1);
    P = P0 * Math.pow(V1 / v, GAMMA);
    Wk = (P0 * V1 - P * v) / gm1;
    dS = 0;
  } else {
    T = T0; P = T0 / v; Wk = 0;
    dS = Math.log(v / V1);
  }
  return { v, P, T, Wk, dS };
}

function buildPVPath() {
  pvPath = [];
  if (mode === 'free') {
    pvPath.push({ v: V1, p: P0 });
    pvPath.push({ v: V2, p: T0 / V2 });
  }
}

/* ---- PHYSICS ENGINE ---- */
function updatePhysics(dt) {
  if (mode === 'free') { updatePhysicsFree(dt); return; }

  // Speed multiplier scales ALL simulation time
  const simDt = dt * speed;

  // Advance expansion: smoothly reduce external force
  if (expanding) {
    expansionFrac += simDt * 0.35;
    if (expansionFrac >= 1) { expansionFrac = 1; expanding = false; done = true; }
    const t = expansionFrac;
    const eased = t * t * (3 - 2 * t); // smoothstep
    extForce = extForceInitial + (extForceFinal - extForceInitial) * eased;
  }

  // Thermostat target
  if (mode === 'isothermal') {
    targetSpeedSq = BASE_SPEED * BASE_SPEED;
  } else if (mode === 'adiabatic') {
    const h = currentGasHeight();
    const frac = (h - gasHeightV1) / (gasHeightV2 - gasHeightV1);
    const currentV = V1 + (V2 - V1) * Math.max(0, Math.min(1, frac));
    const Tcur = T0 * Math.pow(V1 / Math.max(V1, currentV), GAMMA - 1);
    targetSpeedSq = BASE_SPEED * BASE_SPEED * Tcur / T0;
  }

  // Substep loop: keeps physics stable at high speed
  const totalSimTime = simDt * 60;
  const maxStep = 2.5;
  const numSteps = Math.max(1, Math.ceil(totalSimTime / maxStep));
  const stepSize = totalSimTime / numSteps;

  const left = CYL.cx - CYL.w / 2 + 2;
  const right = CYL.cx + CYL.w / 2 - 2;
  const bot = CYL.baseY - 2;

  for (let s = 0; s < numSteps; s++) {
    let totalImpulse = 0;

    for (let p of particles) {
      p.x += p.vx * stepSize;
      p.y += p.vy * stepSize;

      // Wall bounces
      if (p.x - p.r < left)  { p.x = left + p.r;  p.vx = Math.abs(p.vx); }
      if (p.x + p.r > right) { p.x = right - p.r;  p.vx = -Math.abs(p.vx); }
      if (p.y + p.r > bot)   { p.y = bot - p.r;    p.vy = -Math.abs(p.vy); }

      // Piston collision: piston bottom face
      const pistonBot = pistonY + pistonH;
      if (p.y - p.r < pistonBot) {
        if (p.vy < pistonVy) {
          const relVy = p.vy - pistonVy;
          p.vy = -relVy + pistonVy;
          totalImpulse += 2 * Math.abs(relVy);
        }
        p.y = pistonBot + p.r + 0.5;
      }
    }

    // Gentle thermostat: rescale velocities toward target
    const currentSpdSq = measureSpeedSq();
    if (currentSpdSq > 0.1) {
      const ratio = Math.sqrt(targetSpeedSq / currentSpdSq);
      const blend = 0.04;
      const scale = 1 + (ratio - 1) * blend;
      for (let p of particles) { p.vx *= scale; p.vy *= scale; }
    }

    // Piston dynamics
    const gasForce = totalImpulse / Math.max(stepSize, 0.3);
    const netDownForce = extForce - gasForce;
    const dampForce = -pistonVy * 4;

    pistonVy += (netDownForce + dampForce) / PISTON_MASS * stepSize;
    pistonVy *= PISTON_DAMPING;
    pistonY += pistonVy * stepSize;

    if (pistonY < pistonMinY) { pistonY = pistonMinY; pistonVy = Math.max(0, pistonVy); }
    if (pistonY > pistonMaxY) { pistonY = pistonMaxY; pistonVy = Math.min(0, pistonVy); }
  }

  // Derive progress from actual piston position
  progress = (pistonY - pistonMaxY) / (pistonMinY - pistonMaxY);
  progress = Math.max(0, Math.min(1, progress));

  // Build PV path from analytical curve at current progress
  if (expanding || done) {
    const st = computeState(progress);
    if (pvPath.length === 0 || Math.abs(st.v - pvPath[pvPath.length - 1].v) > 0.008) {
      pvPath.push({ v: st.v, p: st.P });
    }
  }
}

function updatePhysicsFree(dt) {
  const simDt = dt * speed;

  // Piston flies up quickly when expanding
  if (expanding) {
    pistonVy = -800 * speed; // fast upward
    pistonY += pistonVy * simDt;
    if (pistonY <= pistonMinY) {
      pistonY = pistonMinY;
      pistonVy = 0;
      expanding = false;
      done = true;
      buildPVPath();
    }
  }

  // Substep loop for particle stability at high speed
  const totalSimTime = simDt * 60;
  const maxStep = 2.5;
  const numSteps = Math.max(1, Math.ceil(totalSimTime / maxStep));
  const stepSize = totalSimTime / numSteps;

  const left = CYL.cx - CYL.w / 2 + 2;
  const right = CYL.cx + CYL.w / 2 - 2;
  const bot = CYL.baseY - 2;

  for (let s = 0; s < numSteps; s++) {
    // Particles bounded by piston (which is flying up or at top)
    const top = pistonY + pistonH + 2;

    for (let p of particles) {
      p.x += p.vx * stepSize;
      p.y += p.vy * stepSize;
      if (p.x - p.r < left)  { p.x = left + p.r;  p.vx = Math.abs(p.vx); }
      if (p.x + p.r > right) { p.x = right - p.r;  p.vx = -Math.abs(p.vx); }
      if (p.y - p.r < top)   { p.y = top + p.r;    p.vy = Math.abs(p.vy); }
      if (p.y + p.r > bot)   { p.y = bot - p.r;    p.vy = -Math.abs(p.vy); }
    }

    // T stays constant in free expansion
    const currentSpdSq = measureSpeedSq();
    if (currentSpdSq > 0.1) {
      const ratio = Math.sqrt(BASE_SPEED * BASE_SPEED / currentSpdSq);
      const blend = 0.03;
      const scale = 1 + (ratio - 1) * blend;
      for (let p of particles) { p.vx *= scale; p.vy *= scale; }
    }
  }

  // Progress: derive from piston position
  if (expanding || done) {
    progress = (pistonY - pistonMaxY) / (pistonMinY - pistonMaxY);
    progress = Math.max(0, Math.min(1, progress));
  }
}

/* ---- DRAWING ---- */
function drawPVDiagram() {
  const { x, y, w, h } = PV;
  X.fillStyle = '#222226';
  X.fillRect(x - 5, y - 15, w + 30, h + 45);
  X.strokeStyle = '#555';
  X.lineWidth = 1;
  X.strokeRect(x - 5, y - 15, w + 30, h + 45);

  X.strokeStyle = '#888';
  X.lineWidth = 1.5;
  X.beginPath();
  X.moveTo(x, y); X.lineTo(x, y + h); X.lineTo(x + w, y + h);
  X.stroke();

  X.fillStyle = '#aaa';
  X.font = '13px Georgia';
  X.textAlign = 'center';
  X.fillText('V', x + w / 2, y + h + 28);
  X.save();
  X.translate(x - 20, y + h / 2);
  X.rotate(-Math.PI / 2);
  X.fillText('P', 0, 0);
  X.restore();

  X.font = '10px Georgia';
  X.fillStyle = '#777';
  const vScale = w / (V2 * 1.15);
  const pMax = P0 * 1.15;
  const pScale = h / pMax;

  for (let v = 1; v <= 3; v++) {
    const px = x + v * vScale;
    X.beginPath(); X.moveTo(px, y + h); X.lineTo(px, y + h + 5); X.stroke();
    X.fillText(v.toString(), px, y + h + 16);
  }
  for (let p = 0.25; p <= 1; p += 0.25) {
    const py = y + h - p * pScale;
    X.beginPath(); X.moveTo(x - 4, py); X.lineTo(x, py); X.stroke();
    X.textAlign = 'right';
    X.fillText(p.toFixed(2), x - 6, py + 4);
  }

  // Reference curves (faint)
  X.setLineDash([4, 4]);
  X.lineWidth = 1;
  X.strokeStyle = 'rgba(255,140,60,0.25)';
  X.beginPath();
  for (let i = 0; i <= 100; i++) {
    const v = V1 + (V2 - V1) * i / 100;
    const p = T0 / v;
    const px = x + v * vScale;
    const py = y + h - p * pScale;
    i === 0 ? X.moveTo(px, py) : X.lineTo(px, py);
  }
  X.stroke();
  X.strokeStyle = 'rgba(100,160,255,0.25)';
  X.beginPath();
  for (let i = 0; i <= 100; i++) {
    const v = V1 + (V2 - V1) * i / 100;
    const p = P0 * Math.pow(V1 / v, GAMMA);
    const px = x + v * vScale;
    const py = y + h - p * pScale;
    i === 0 ? X.moveTo(px, py) : X.lineTo(px, py);
  }
  X.stroke();
  X.setLineDash([]);

  // Active PV path
  if (pvPath.length > 1) {
    let col;
    if (mode === 'isothermal') col = '#ff8c3c';
    else if (mode === 'adiabatic') col = '#6ca0ff';
    else col = '#8c8';

    X.strokeStyle = col;
    X.lineWidth = 2.5;

    if (mode === 'free') {
      X.setLineDash([6, 6]);
      X.beginPath();
      X.moveTo(x + pvPath[0].v * vScale, y + h - pvPath[0].p * pScale);
      for (let i = 1; i < pvPath.length; i++) {
        X.lineTo(x + pvPath[i].v * vScale, y + h - pvPath[i].p * pScale);
      }
      X.stroke();
      X.setLineDash([]);
      for (let pt of pvPath) {
        X.beginPath();
        X.arc(x + pt.v * vScale, y + h - pt.p * pScale, 5, 0, Math.PI * 2);
        X.fillStyle = col;
        X.fill();
      }
    } else {
      X.beginPath();
      X.moveTo(x + pvPath[0].v * vScale, y + h - pvPath[0].p * pScale);
      for (let i = 1; i < pvPath.length; i++) {
        X.lineTo(x + pvPath[i].v * vScale, y + h - pvPath[i].p * pScale);
      }
      X.stroke();
    }
  }

  // Start point
  X.beginPath();
  X.arc(x + V1 * vScale, y + h - P0 * pScale, 5, 0, Math.PI * 2);
  X.fillStyle = '#fff';
  X.fill();
  X.font = '11px Georgia';
  X.fillStyle = '#ccc';
  X.textAlign = 'left';
  X.fillText('Start', x + V1 * vScale + 8, y + h - P0 * pScale + 4);

  // Current point
  if (expanding || done) {
    const cpx = x + curV * vScale;
    const cpy = y + h - curP * pScale;
    X.beginPath();
    X.arc(cpx, cpy, 5, 0, Math.PI * 2);
    X.fillStyle = mode === 'isothermal' ? '#ff8c3c' : mode === 'adiabatic' ? '#6ca0ff' : '#8c8';
    X.fill();
    X.strokeStyle = '#fff';
    X.lineWidth = 1;
    X.stroke();
  }

  // Shade work area
  if ((mode === 'isothermal' || mode === 'adiabatic') && pvPath.length > 2) {
    X.globalAlpha = 0.12;
    X.fillStyle = mode === 'isothermal' ? '#ff8c3c' : '#6ca0ff';
    X.beginPath();
    X.moveTo(x + pvPath[0].v * vScale, y + h);
    for (let pt of pvPath) {
      X.lineTo(x + pt.v * vScale, y + h - pt.p * pScale);
    }
    X.lineTo(x + pvPath[pvPath.length - 1].v * vScale, y + h);
    X.closePath();
    X.fill();
    X.globalAlpha = 1;

    if (done) {
      X.font = '11px Georgia';
      X.fillStyle = '#aaa';
      X.textAlign = 'center';
      const midV = (V1 + curV) / 2;
      X.fillText('W = \u222BPdV', x + midV * vScale, y + h - 15);
    }
  }
}

function drawStateReadout() {
  const { x, y } = ST;
  X.fillStyle = '#222226';
  X.fillRect(x - 5, y, 390, 170);
  X.strokeStyle = '#555';
  X.lineWidth = 1;
  X.strokeRect(x - 5, y, 390, 170);

  X.font = '13px Georgia';
  X.textAlign = 'left';

  const lines = [
    { label: 'Temperature:', value: curT.toFixed(3), color: tempColor(curT), unit: ' (kT/k)' },
    { label: 'Pressure:', value: curP.toFixed(3), color: '#ccc', unit: '' },
    { label: 'Volume:', value: curV.toFixed(3), color: '#ccc', unit: '' },
    { label: 'Work done (W):', value: curW.toFixed(4), color: curW > 0.001 ? '#fd6' : '#888', unit: '' },
    { label: '\u0394S (gas):', value: curDS.toFixed(4), color: curDS > 0.001 ? '#8e8' : '#888', unit: '' },
  ];

  let ly = y + 22;
  for (let ln of lines) {
    X.fillStyle = '#999';
    X.fillText(ln.label, x + 10, ly);
    X.fillStyle = ln.color;
    X.fillText(ln.value + ln.unit, x + 160, ly);
    ly += 26;
  }

  ly += 6;
  X.font = 'italic 12px Georgia';
  if (mode === 'isothermal') {
    X.fillStyle = '#ff8c3c';
    X.fillText('Heat flows in from bath to maintain T', x + 10, ly);
  } else if (mode === 'adiabatic') {
    X.fillStyle = '#6ca0ff';
    X.fillText('No heat transfer \u2014 gas cools', x + 10, ly);
  } else {
    X.fillStyle = '#8c8';
    X.fillText('No work done \u2014 entropy increases', x + 10, ly);
  }
}

function drawApparatus() {
  const { cx, w: cw, wallThick: wt, topY, baseY, baseH } = CYL;
  const left = cx - cw / 2 - wt;
  const right = cx + cw / 2 + wt;
  const innerL = cx - cw / 2;
  const innerR = cx + cw / 2;

  if (mode === 'isothermal') drawHeatBath(left, right, topY, baseY);
  else if (mode === 'adiabatic') drawInsulation(left, right, topY, baseY);

  // Cylinder walls
  const wallGrad = X.createLinearGradient(left, 0, left + wt, 0);
  wallGrad.addColorStop(0, '#666');
  wallGrad.addColorStop(0.5, '#888');
  wallGrad.addColorStop(1, '#666');
  X.fillStyle = wallGrad;
  X.fillRect(left, topY, wt, baseY - topY);
  X.fillRect(right - wt, topY, wt, baseY - topY);

  // Base
  X.fillStyle = '#777';
  X.fillRect(left - 15, baseY, (right - left) + 30, baseH);
  X.fillStyle = '#888';
  X.fillRect(left - 15, baseY, (right - left) + 30, 4);

  // Interior background
  X.fillStyle = '#1a1a1e';
  X.fillRect(innerL, topY, cw, baseY - topY);

  // All modes use the actual pistonY now (free mode piston flies up)
  const drawPY = pistonY;

  if (mode === 'free') {
    drawFreeExpansionSetup(innerL, innerR, drawPY, topY, baseY);
  }
  // Draw piston in all modes (free mode shows it flying up / resting at top)
  drawPistonAndWeight(cx, innerL, innerR, drawPY, topY);

  drawParticles();

  X.strokeStyle = '#999';
  X.lineWidth = 1;
  X.strokeRect(left, topY, right - left, baseY - topY);
}

function drawHeatBath(left, right, topY, baseY) {
  const pad = 30;
  const bathL = left - pad, bathR = right + pad;
  const bathT = topY + 30, bathB = baseY + 10;

  const wGrad = X.createLinearGradient(0, bathT, 0, bathB);
  wGrad.addColorStop(0, 'rgba(255,100,40,0.15)');
  wGrad.addColorStop(1, 'rgba(255,60,20,0.25)');
  X.fillStyle = wGrad;
  X.fillRect(bathL, bathT, bathR - bathL, bathB - bathT);

  X.strokeStyle = 'rgba(255,120,50,0.5)';
  X.lineWidth = 2;
  X.strokeRect(bathL, bathT, bathR - bathL, bathB - bathT);

  X.font = '11px Georgia';
  X.fillStyle = '#d87040';
  X.textAlign = 'center';
  X.fillText('Heat Bath (T = const)', (bathL + bathR) / 2, bathB + 16);

  // Ambient wavy heat lines (always visible)
  const time = Date.now() / 600;
  X.strokeStyle = 'rgba(255,130,50,0.35)';
  X.lineWidth = 1.5;
  for (let i = 0; i < 3; i++) {
    const bx = bathL + 8 + i * (bathR - bathL - 16) / 2;
    X.beginPath();
    for (let dy = 0; dy < 40; dy += 2) {
      const yy = bathT + 10 + dy;
      const xx = bx + Math.sin(dy * 0.2 + time + i) * 6;
      dy === 0 ? X.moveTo(xx, yy) : X.lineTo(xx, yy);
    }
    X.stroke();
  }

  // Animated heat arrows flowing INTO the gas during expansion
  if (expanding || (done && progress > 0.05)) {
    const intensity = expanding ? Math.min(1, expansionFrac * 3) : Math.max(0, 1 - (expansionFrac - 0.8) * 5);
    const alpha = 0.6 * intensity;
    if (alpha > 0.02) {
      const t2 = Date.now() / 300;
      const innerL = CYL.cx - CYL.w / 2;
      const innerR = CYL.cx + CYL.w / 2;
      const gasMidY = (pistonY + pistonH + CYL.baseY) / 2;

      // Heat arrows from left wall
      for (let i = 0; i < 4; i++) {
        const yOff = (i - 1.5) * 50;
        const ay = gasMidY + yOff;
        if (ay < topY + 40 || ay > baseY - 10) continue;
        // Arrow slides inward cyclically
        const phase = (t2 + i * 1.7) % 3;
        const frac = phase / 3; // 0..1
        const startX = bathL + 5;
        const endX = innerL - 2;
        const ax = startX + (endX - startX) * frac;
        const arrAlpha = alpha * Math.sin(frac * Math.PI); // fade in/out
        drawHeatArrow(ax, ay, 1, arrAlpha);
      }
      // Heat arrows from right wall
      for (let i = 0; i < 4; i++) {
        const yOff = (i - 1.5) * 50;
        const ay = gasMidY + yOff;
        if (ay < topY + 40 || ay > baseY - 10) continue;
        const phase = (t2 + i * 1.7 + 0.8) % 3;
        const frac = phase / 3;
        const startX = bathR - 5;
        const endX = innerR + 2;
        const ax = startX + (endX - startX) * frac;
        const arrAlpha = alpha * Math.sin(frac * Math.PI);
        drawHeatArrow(ax, ay, -1, arrAlpha);
      }
      // Heat arrows from bottom
      for (let i = 0; i < 3; i++) {
        const xOff = (i - 1) * 45;
        const ax = CYL.cx + xOff;
        const phase = (t2 + i * 1.3 + 1.5) % 3;
        const frac = phase / 3;
        const startY = bathB - 5;
        const endY = CYL.baseY + 2;
        const ay = startY + (endY - startY) * frac;
        const arrAlpha = alpha * Math.sin(frac * Math.PI);
        drawHeatArrowVert(ax, ay, -1, arrAlpha);
      }
    }
  }
}

function drawHeatArrow(x, y, dir, alpha) {
  // dir: 1 = pointing right (into gas from left), -1 = pointing left
  if (alpha < 0.01) return;
  X.save();
  X.globalAlpha = alpha;
  X.strokeStyle = '#ff9944';
  X.fillStyle = '#ff9944';
  X.lineWidth = 2;
  const len = 16;
  const tipLen = 6;
  X.beginPath();
  X.moveTo(x, y);
  X.lineTo(x + dir * len, y);
  X.stroke();
  X.beginPath();
  X.moveTo(x + dir * len, y);
  X.lineTo(x + dir * (len - tipLen), y - 3);
  X.lineTo(x + dir * (len - tipLen), y + 3);
  X.closePath();
  X.fill();
  // "Q" label
  X.font = '10px Georgia';
  X.textAlign = 'center';
  X.fillText('Q', x + dir * len / 2, y - 6);
  X.restore();
}

function drawHeatArrowVert(x, y, dir, alpha) {
  if (alpha < 0.01) return;
  X.save();
  X.globalAlpha = alpha;
  X.strokeStyle = '#ff9944';
  X.fillStyle = '#ff9944';
  X.lineWidth = 2;
  const len = 14;
  const tipLen = 5;
  X.beginPath();
  X.moveTo(x, y);
  X.lineTo(x, y + dir * len);
  X.stroke();
  X.beginPath();
  X.moveTo(x, y + dir * len);
  X.lineTo(x - 3, y + dir * (len - tipLen));
  X.lineTo(x + 3, y + dir * (len - tipLen));
  X.closePath();
  X.fill();
  X.restore();
}

function drawInsulation(left, right, topY, baseY) {
  const pad = 22;
  const insL = left - pad, insR = right + pad;
  const insT = topY - 10, insB = baseY + 10;

  X.fillStyle = 'rgba(80,80,60,0.3)';
  X.fillRect(insL, insT, insR - insL, insB - insT);

  X.strokeStyle = 'rgba(160,140,80,0.35)';
  X.lineWidth = 1;
  for (let i = insL; i < insR + (insB - insT); i += 12) {
    X.beginPath();
    X.moveTo(Math.max(insL, i), insT);
    X.lineTo(Math.max(insL, i - (insB - insT)), insB);
    X.stroke();
  }

  X.strokeStyle = 'rgba(160,140,80,0.5)';
  X.lineWidth = 2;
  X.strokeRect(insL, insT, insR - insL, insB - insT);

  X.font = '11px Georgia';
  X.fillStyle = '#aa9960';
  X.textAlign = 'center';
  X.fillText('Insulation (Q = 0)', (insL + insR) / 2, insB + 16);
}

function drawFreeExpansionSetup(innerL, innerR, drawPY, topY, baseY) {
  // Show vacuum above the piston (piston is drawn separately by drawPistonAndWeight)
  const pistonTop = drawPY; // top of piston face

  if (!expanding && !done) {
    // Dark vacuum region above the piston
    X.fillStyle = 'rgba(0,0,0,0.6)';
    X.fillRect(innerL, topY, innerR - innerL, pistonTop - topY);
    X.font = '14px Georgia';
    X.fillStyle = '#888';
    X.textAlign = 'center';
    X.fillText('VACUUM', CYL.cx, (topY + pistonTop) / 2 + 5);
  } else if (expanding) {
    // Piston is flying up - show vacuum shrinking above it
    const vacuumHeight = pistonTop - topY;
    if (vacuumHeight > 20) {
      X.fillStyle = 'rgba(0,0,0,0.4)';
      X.fillRect(innerL, topY, innerR - innerL, vacuumHeight);
      if (vacuumHeight > 60) {
        X.font = '12px Georgia';
        X.fillStyle = 'rgba(136,136,136,0.6)';
        X.textAlign = 'center';
        X.fillText('VACUUM', CYL.cx, (topY + pistonTop) / 2 + 4);
      }
    }
  }

  X.font = '11px Georgia';
  X.fillStyle = '#8a8';
  X.textAlign = 'center';
  X.fillText('Free Expansion', CYL.cx, baseY + 36);
}

function drawPistonAndWeight(cx, innerL, innerR, drawPY, topY) {
  const cw = innerR - innerL;

  // Piston body
  const pisGrad = X.createLinearGradient(0, drawPY, 0, drawPY + pistonH);
  pisGrad.addColorStop(0, '#aaa');
  pisGrad.addColorStop(0.3, '#ccc');
  pisGrad.addColorStop(0.7, '#bbb');
  pisGrad.addColorStop(1, '#888');
  X.fillStyle = pisGrad;
  X.fillRect(innerL + 2, drawPY, cw - 4, pistonH);

  X.strokeStyle = '#ddd';
  X.lineWidth = 1;
  X.beginPath();
  X.moveTo(innerL + 2, drawPY);
  X.lineTo(innerR - 2, drawPY);
  X.stroke();

  // Rod and weight (not shown in free expansion - no external weight)
  if (mode === 'free') return;
  const weightTravel = 80;
  const pistonRange = pistonMaxY - pistonMinY;
  const weightBaseY = topY - weightH - 15;
  const weightFrac = (pistonMaxY - drawPY) / pistonRange;
  const weightYPos = weightBaseY - weightFrac * weightTravel;
  const rodTop = weightYPos + weightH;
  const rodX = cx - rodW / 2;

  X.fillStyle = '#999';
  X.fillRect(rodX, rodTop, rodW, drawPY - rodTop);
  X.fillStyle = '#bbb';
  X.fillRect(rodX + 2, rodTop, 3, drawPY - rodTop);

  const weightY = weightYPos;
  const weightX = cx - weightW / 2;

  // Weight size changes with external force (visual cue for weight removal)
  const forceRatio = (extForce && extForceInitial > 0)
    ? Math.max(0.35, extForce / extForceInitial) : 1;
  const drawWeightH = weightH * forceRatio;
  const drawWeightW = weightW * forceRatio;
  const dwX = cx - drawWeightW / 2;
  const dwY = weightY + weightH - drawWeightH;

  const wGrad = X.createLinearGradient(dwX, dwY, dwX + drawWeightW, dwY + drawWeightH);
  wGrad.addColorStop(0, '#665');
  wGrad.addColorStop(0.5, '#887');
  wGrad.addColorStop(1, '#554');
  X.fillStyle = wGrad;
  X.fillRect(dwX, dwY, drawWeightW, drawWeightH);
  X.strokeStyle = '#aa9';
  X.lineWidth = 1;
  X.strokeRect(dwX, dwY, drawWeightW, drawWeightH);

  X.font = '11px Georgia';
  X.fillStyle = '#ccc';
  X.textAlign = 'center';
  if (drawWeightH > 20) {
    X.fillText('Weight', cx, dwY + drawWeightH / 2 + 4);
  }

  // Arrow showing weight moving up during expansion
  if (expanding && progress > 0.05 && progress < 0.95) {
    X.strokeStyle = '#fd6';
    X.lineWidth = 2;
    const arrowX = dwX + drawWeightW + 12;
    const arrowBot = dwY + drawWeightH;
    const arrowTop = dwY - 15;
    X.beginPath();
    X.moveTo(arrowX, arrowBot);
    X.lineTo(arrowX, arrowTop);
    X.stroke();
    X.beginPath();
    X.moveTo(arrowX, arrowTop);
    X.lineTo(arrowX - 5, arrowTop + 8);
    X.lineTo(arrowX + 5, arrowTop + 8);
    X.closePath();
    X.fillStyle = '#fd6';
    X.fill();
  }
}

function drawParticles() {
  const col = tempColor(curT);
  for (let p of particles) {
    X.beginPath();
    X.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    X.fillStyle = col;
    X.globalAlpha = 0.85;
    X.fill();
    X.globalAlpha = 1;
    // Highlight
    X.beginPath();
    X.arc(p.x - p.r * 0.25, p.y - p.r * 0.25, p.r * 0.3, 0, Math.PI * 2);
    X.fillStyle = 'rgba(255,255,255,0.3)';
    X.fill();
  }
}

function drawTitle() {
  X.font = 'bold 16px Georgia';
  X.fillStyle = '#ddd';
  X.textAlign = 'center';
  X.fillText('Gas Expansion Processes', W / 2, 24);

  X.font = '13px Georgia';
  let modeLabel, modeCol;
  if (mode === 'isothermal') { modeLabel = 'Isothermal (T = const)'; modeCol = '#ff8c3c'; }
  else if (mode === 'adiabatic') { modeLabel = 'Adiabatic (Q = 0)'; modeCol = '#6ca0ff'; }
  else { modeLabel = 'Free Expansion (W = 0)'; modeCol = '#8c8'; }
  X.fillStyle = modeCol;
  X.fillText(modeLabel, W / 2, 44);
}

/* ---- MAIN LOOP ---- */
let lastTime = 0;

function drawAll() {
  X.clearRect(0, 0, W, H);
  X.fillStyle = '#2a2a2e';
  X.fillRect(0, 0, W, H);
  drawTitle();
  drawApparatus();
  drawPVDiagram();
  drawStateReadout();
}

function frame(ts) {
  if (!started) { drawAll(); requestAnimationFrame(frame); return; }
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  speed = parseFloat(document.getElementById('spd').value);

  // Physics update (particles + piston dynamics)
  updatePhysics(dt);

  // Compute analytical state for readout
  const st = computeState(progress);
  curV = st.v; curP = st.P; curT = st.T; curW = st.Wk; curDS = st.dS;

  drawAll();
  requestAnimationFrame(frame);
}

/* ---- CONTROLS ---- */
function selectMode(m) {
  mode = m;
  resetSim();
  document.getElementById('btnIso').classList.toggle('active', m === 'isothermal');
  document.getElementById('btnAdi').classList.toggle('active', m === 'adiabatic');
  document.getElementById('btnFree').classList.toggle('active', m === 'free');
}

function startExpansion() {
  if (expanding || done) return;
  expanding = true;
  expansionFrac = 0;
  pvPath = [{ v: V1, p: P0 }];

  if (mode === 'free') return;

  // Calculate initial and final external forces
  const h1 = currentGasHeight();
  const spdSq = measureSpeedSq();
  extForceInitial = calcEqForce(h1, spdSq);
  extForce = extForceInitial;

  if (mode === 'isothermal') {
    // Same T, larger volume -> lower pressure
    extForceFinal = calcEqForce(gasHeightV2, spdSq);
  } else {
    // Adiabatic: T drops, volume increases
    const Tf = T0 * Math.pow(V1 / V2, GAMMA - 1);
    const finalSpdSq = BASE_SPEED * BASE_SPEED * Tf / T0;
    extForceFinal = calcEqForce(gasHeightV2, finalSpdSq);
  }
}

function resetSim() {
  expanding = false;
  done = false;
  progress = 0;
  expansionFrac = 0;
  pvPath = [];
  pistonY = pistonMaxY;
  pistonVy = 0;
  extForce = calcEqForce(gasHeightV1, BASE_SPEED * BASE_SPEED);
  extForceInitial = extForce;
  extForceFinal = extForce;
  targetSpeedSq = BASE_SPEED * BASE_SPEED;
  const st = computeState(0);
  curV = st.v; curP = st.P; curT = st.T; curW = st.Wk; curDS = st.dS;
  createParticles();
}

function init() {
  started = true;
  document.getElementById('overlay').style.display = 'none';
  selectMode('isothermal');
  lastTime = performance.now();
}

// Initial state
pistonY = pistonMaxY;
pistonVy = 0;
extForce = calcEqForce(gasHeightV1, BASE_SPEED * BASE_SPEED);
extForceInitial = extForce;
extForceFinal = extForce;
targetSpeedSq = BASE_SPEED * BASE_SPEED;
const initSt = computeState(0);
curV = initSt.v; curP = initSt.P; curT = initSt.T; curW = initSt.Wk; curDS = initSt.dS;
createParticles();
requestAnimationFrame(frame);
</script>
