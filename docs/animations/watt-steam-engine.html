<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>James Watt Steam Engine (1788)</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#2a2a2e;display:flex;flex-direction:column;align-items:center;
       justify-content:center;min-height:100vh;font-family:'Georgia',serif;color:#ccc;overflow:hidden}
  canvas{border-radius:4px}
  .controls{margin-top:10px;display:flex;gap:16px;align-items:center;flex-wrap:wrap;justify-content:center}
  .controls button{background:#444;color:#ddd;border:1px solid #666;padding:5px 16px;
                   border-radius:4px;cursor:pointer;font-family:inherit;font-size:.85em}
  .controls button:hover{background:#555}
  .controls label{font-size:.8em;color:#999}
  .controls input[type=range]{width:120px;accent-color:#c44}
  .legend{margin-top:6px;display:flex;gap:18px;font-size:.73em;color:#888;flex-wrap:wrap;justify-content:center}
  .legend span{display:flex;align-items:center;gap:4px}
  .legend .sw{width:12px;height:12px;border-radius:2px;display:inline-block}
</style>
</head>
<body>
<canvas id="c" width="1100" height="820"></canvas>
<div class="controls">
  <button id="btn">Pause</button>
  <label>Speed: <input type="range" id="spd" min="0.05" max="1.5" step="0.05" value="0.25"></label>
  <span id="rpm" style="font-size:.8em;color:#888">15 RPM</span>
</div>
<div class="legend">
  <span><i class="sw" style="background:rgba(230,70,20,.8)"></i> Live steam (high pressure)</span>
  <span><i class="sw" style="background:rgba(90,110,160,.7)"></i> Spent steam (exhaust)</span>
</div>
<script>
const C=document.getElementById('c'),X=C.getContext('2d');
let run=true,spd=0.25,ang=0;
document.getElementById('btn').onclick=function(){run=!run;this.textContent=run?'Pause':'Play'};
document.getElementById('spd').oninput=function(){
  spd=+this.value;document.getElementById('rpm').textContent=Math.round(60*spd)+' RPM';
};

/*
  ╔══════════════════════════════════════════════════╗
  ║          PHYSICAL STRUCTURE                      ║
  ║                                                  ║
  ║  Boiler ──pipe──► VALVE BOX (steam chest)        ║
  ║                   ┌────────────────────┐         ║
  ║                   │ Steam fills this   │→exhaust ║
  ║                   │ ┌──D-VALVE──┐      │  pipe   ║
  ║                   │ │land|cav|land│    │  up to  ║
  ║                   └─┤─┬──┤──┬──┤──┘───┘  chimney║
  ║                     │ LP│EX│RP│                  ║
  ║                   ┌─┘/ └──┘ \└─┐  Pipes angle   ║
  ║                  ┌┘/           \└┐ inward to     ║
  ║                  │/             \│ converge at   ║
  ║  ┌───────────────┤───────────────┤──────────┐    ║
  ║  │ Left chamber  │    PISTON     │  Right   │    ║
  ║  │   (clearance) │ ████████████  │  chamber ├──► ║
  ║  │               │              │          │rod  ║
  ║  └───────────────┴───────────────┴──────────┘    ║
  ║                    CYLINDER              Flywheel║
  ╚══════════════════════════════════════════════════╝
*/

// ─── GEOMETRY (all carefully computed) ───

// Boiler + Furnace
const BLR={x:30,y:210,w:155,h:200};
const FRN={x:30,y:420,w:155,h:135};

// Cylinder
const CYL={x:230,y:440,w:280,h:110};
const WALL=12; // wall thickness
const BORE={x:CYL.x+WALL,y:CYL.y+WALL,w:CYL.w-2*WALL,h:CYL.h-2*WALL};
// bore: 242 to 498, 452 to 538, center at (370, 495)

// Piston
const PW=24; // piston width

// Flywheel
const FW={cx:870,cy:495,r:115};
const CR=50; // crank radius
const CONROD=300; // connecting rod length

// Crosshead → piston connection
const PISTON_ROD=225; // length from crosshead pin to piston left face

// Verify piston stays in bore:
// crossheadX: min=FW.cx-CR-CONROD=870-50-300=520, max=870+50-300=620
// pistonFace: min=520-225=295, max=620-225=395
// pistonBack: min=295+24=319, max=395+24=419
// bore: 242 to 498 → piston 295..419 is inside 242..498 ✓

// Cylinder ports (where pipes exit the cylinder top)
// Left port near left end, right port near right end
// Piston never reaches these (295 > 283, 419 < 462)
const CYLPORT_L={cx:275,w:16}; // center x, width → 267..283
const CYLPORT_R={cx:470,w:16}; // center x, width → 462..478

// Valve area
// The pipes from the cylinder converge upward to three openings:
//   LEFT PORT — EXHAUST U-TUBE (center) — RIGHT PORT
// The steam chest fills the whole box (hot).
// The exhaust chimney is a SEPARATE pipe that comes down into the center opening.
// The slider is a bridge that connects one port to the exhaust center.
// The other port is left open to the steam chest.

const VPIPE_L={botCx:275,topCx:330,w:18};
const VPIPE_R={botCx:470,topCx:430,w:18};

// Valve box (steam chest)
const VB={x:260,y:250,w:245,h:110};
const VB_BOT=VB.y+VB.h; // =360, bottom of valve box

// Three openings at the bottom of the valve box (where pipes enter)
const PORT_L_CX=330;   // left cylinder pipe enters here
const PORT_EX_CX=380;  // exhaust U-tube center
const PORT_R_CX=430;   // right cylinder pipe enters here
const PORT_W=14;        // width of each opening

// The exhaust chimney pipe (separate, comes down from above into center opening)
const EX_PIPE_X=CYL.x+CYL.w+40; // exhaust chimney well to the right, separate from everything

// Slider: a bridge piece connecting one port to the exhaust center
// It slides left-right. When left: bridges LEFT port to EXHAUST center.
// When right: bridges RIGHT port to EXHAUST center.
const SLIDER_H=22;
const SLIDER_Y=VB_BOT-SLIDER_H-4; // sits near the bottom of the valve box
const VALVE_TRAVEL=35;

function crankPin(a){return{x:FW.cx+CR*Math.cos(a),y:FW.cy+CR*Math.sin(a)}}

function crossheadX(a){
  const cp=crankPin(a);
  const dy=495-cp.y; // 495 = bore center Y
  return cp.x-Math.sqrt(Math.max(0,CONROD*CONROD-dy*dy));
}

function pistonFaceX(a){return crossheadX(a)-PISTON_ROD;}

function valveOffset(a){
  // Returns offset: negative=slider bridges LEFT port to exhaust, positive=bridges RIGHT
  // Phase: -cos(a) so that steam enters the SMALL chamber to push the piston.
  // At a=0 (piston rightmost, right chamber small): vo<0 → right gets steam ✓
  // At a=PI (piston leftmost, left chamber small): vo>0 → left gets steam ✓
  // 90° lead: standard eccentric offset
  return -Math.cos(a)*VALVE_TRAVEL;
}

// ─── PARTICLES ───
let steamP=[],fireP=[];

// ─── MOLECULE SWARMS ───
// Molecules flow along paths showing steam/exhaust movement
let molecules=[];
const MAX_MOLECULES=500;
// Current slider bounds — updated each frame so molecules can be culled
let curSliderL=0, curSliderR=0, curSliderTop=0, curSliderBot=0;
// Current U-tube leg positions
let curULeftCx=0, curURightCx=0, curUW=0;

function spawnMolecule(path,col,speed,hot){
  // path = array of {x,y} waypoints
  if(molecules.length>=MAX_MOLECULES) return;
  molecules.push({
    path,col,speed:speed||80,
    t:0, // progress along path 0..1
    size: hot ? 2+Math.random()*2.5 : 1.5+Math.random()*2,
    wobbleX:(Math.random()-.5)*(hot?14:6),
    wobbleY:(Math.random()-.5)*(hot?14:6),
    wobbleSpeed: hot ? 5+Math.random()*8 : 2+Math.random()*4,
    hot: !!hot
  });
}

function updateAndDrawMolecules(dt){
  molecules.forEach(m=>{
    m.t+=dt*m.speed/totalPathLen(m.path);
    if(m.t>1) m.t=-1; // mark for removal
    if(m.t<0) return;
    const pos=pathPos(m.path,m.t);

    // Kill molecules that are inside the slider body but NOT inside the U-tube.
    // This prevents molecules from floating through the slider when it moves.
    const px=pos.x, py=pos.y;
    if(px>curSliderL && px<curSliderR && py>curSliderTop && py<curSliderBot){
      // Inside slider bounds — check if inside U-tube
      const inLeftLeg = Math.abs(px-curULeftCx)<curUW/2+3;
      const inRightLeg = Math.abs(px-curURightCx)<curUW/2+3;
      const inTopBar = py<curSliderTop+20 && px>curULeftCx-curUW/2-3 && px<curURightCx+curUW/2+3;
      if(!inLeftLeg && !inRightLeg && !inTopBar){
        m.t=-1; // kill — it's in the solid part of the slider
        return;
      }
    }

    const t=Date.now()/1000;
    const wx=Math.sin(t*m.wobbleSpeed+m.t*10)*m.wobbleX;
    const wy=Math.cos(t*m.wobbleSpeed*1.3+m.t*7)*m.wobbleY;
    const alpha=Math.min(1,Math.min(m.t*5,(1-m.t)*5))*(m.hot?0.85:0.6);
    X.globalAlpha=alpha;
    if(m.hot){
      X.fillStyle=m.col;
      X.beginPath();X.arc(pos.x+wx,pos.y+wy,m.size+1.5,0,Math.PI*2);
      X.fillStyle=`rgba(255,120,30,${alpha*0.2})`;X.fill();
    }
    X.fillStyle=m.col;
    X.beginPath();X.arc(pos.x+wx,pos.y+wy,m.size,0,Math.PI*2);X.fill();
    X.globalAlpha=1;
  });
  molecules=molecules.filter(m=>m.t>=0);
}

function totalPathLen(path){
  let len=0;
  for(let i=1;i<path.length;i++){
    const dx=path[i].x-path[i-1].x,dy=path[i].y-path[i-1].y;
    len+=Math.sqrt(dx*dx+dy*dy);
  }
  return len||1;
}

function pathPos(path,t){
  const total=totalPathLen(path);
  let target=t*total,accum=0;
  for(let i=1;i<path.length;i++){
    const dx=path[i].x-path[i-1].x,dy=path[i].y-path[i-1].y;
    const segLen=Math.sqrt(dx*dx+dy*dy);
    if(accum+segLen>=target){
      const frac=(target-accum)/segLen;
      return{x:path[i-1].x+dx*frac, y:path[i-1].y+dy*frac};
    }
    accum+=segLen;
  }
  return path[path.length-1];
}

// ─── HELPERS ───
function rr(x,y,w,h,r,f,s){
  X.beginPath();X.moveTo(x+r,y);X.lineTo(x+w-r,y);X.quadraticCurveTo(x+w,y,x+w,y+r);
  X.lineTo(x+w,y+h-r);X.quadraticCurveTo(x+w,y+h,x+w-r,y+h);X.lineTo(x+r,y+h);
  X.quadraticCurveTo(x,y+h,x,y+h-r);X.lineTo(x,y+r);X.quadraticCurveTo(x,y,x+r,y);
  X.closePath();if(f)X.fill();if(s)X.stroke();
}
function mGrad(x1,x2,d,l){const g=X.createLinearGradient(x1,0,x2,0);g.addColorStop(0,d);g.addColorStop(.35,l);g.addColorStop(.65,l);g.addColorStop(1,d);return g;}
function rivet(x,y){X.beginPath();X.arc(x,y,3,0,Math.PI*2);X.fillStyle='#aaa';X.fill();X.strokeStyle='#666';X.lineWidth=.5;X.stroke();}
function label(t,x,y,sz,c){X.fillStyle=c||'#bbb';X.font=(sz||12)+'px Georgia';X.textAlign='center';X.fillText(t,x,y);}

const HOT='rgb(230,70,20)',COLD='rgb(90,110,160)';

// ─── DRAW FUNCTIONS ───

function drawBG(){
  const g=X.createLinearGradient(0,0,0,820);g.addColorStop(0,'#333338');g.addColorStop(1,'#222226');
  X.fillStyle=g;X.fillRect(0,0,1100,820);
  X.fillStyle='#353535';X.fillRect(0,640,1100,180);
}

function drawFurnace(){
  X.fillStyle=mGrad(FRN.x,FRN.x+FRN.w,'#555','#666');X.strokeStyle='#777';X.lineWidth=2;
  rr(FRN.x,FRN.y,FRN.w,FRN.h,5,true,true);
  X.fillStyle='#1a1a1a';X.fillRect(FRN.x+8,FRN.y+14,FRN.w-16,FRN.h-18);
  // Coal briquettes — rectangular blocks piled up
  const coalColors=['#222','#1e1e1e','#252520','#2a2525','#201e1e'];
  const briquettes=[
    // Bottom row
    {x:12,y:85,w:28,h:18},{x:42,y:88,w:25,h:16},{x:70,y:84,w:30,h:20},
    {x:102,y:86,w:26,h:18},{x:130,y:88,w:22,h:16},
    // Middle row
    {x:18,y:62,w:24,h:20},{x:45,y:65,w:30,h:18},{x:78,y:60,w:26,h:22},
    {x:108,y:64,w:28,h:18},{x:138,y:66,w:16,h:16},
    // Top row (fewer, some tumbled)
    {x:28,y:42,w:22,h:16},{x:55,y:38,w:28,h:20},{x:88,y:40,w:24,h:18},
    {x:118,y:44,w:20,h:14},
    // A few small pieces on top
    {x:42,y:26,w:18,h:12},{x:75,y:22,w:22,h:14},{x:110,y:28,w:16,h:12},
  ];
  briquettes.forEach((br,i)=>{
    const bx=FRN.x+br.x,by=FRN.y+br.y;
    X.fillStyle=coalColors[i%coalColors.length];
    rr(bx,by,br.w,br.h,2,true,false);
    // Highlight edge to show 3D shape
    X.fillStyle='rgba(60,55,50,.3)';
    X.fillRect(bx+1,by+1,br.w-2,3);
    // Dark bottom edge
    X.fillStyle='rgba(0,0,0,.3)';
    X.fillRect(bx+1,by+br.h-3,br.w-2,2);
  });
  // Glowing embers among the coal
  const ft=Date.now()/1000;
  for(let i=0;i<12;i++){
    const ex=FRN.x+18+Math.random()*(FRN.w-36);
    const ey=FRN.y+28+Math.random()*(FRN.h-44);
    const ea=.15+.15*Math.sin(ft*3+i*2.1);
    X.fillStyle=`rgba(255,${80+Math.random()*60|0},${10+Math.random()*20|0},${ea})`;
    X.beginPath();X.arc(ex,ey,2+Math.random()*3,0,Math.PI*2);X.fill();
  }
  const gl=X.createRadialGradient(FRN.x+FRN.w/2,FRN.y+10,5,FRN.x+FRN.w/2,FRN.y+10,100);
  gl.addColorStop(0,'rgba(255,110,20,.35)');gl.addColorStop(1,'rgba(255,50,0,0)');
  X.fillStyle=gl;X.fillRect(FRN.x-10,FRN.y-30,FRN.w+20,FRN.h+10);
  label('Furnace',FRN.x+FRN.w/2,FRN.y+FRN.h+18,13);
}

function drawBoiler(){
  X.fillStyle=mGrad(BLR.x,BLR.x+BLR.w,'#5a5a5a','#7e7e7e');X.strokeStyle='#999';X.lineWidth=2;
  rr(BLR.x,BLR.y,BLR.w,BLR.h,6,true,true);
  const wT=BLR.y+BLR.h*.35;
  X.fillStyle='rgba(50,85,145,.55)';X.fillRect(BLR.x+4,wT,BLR.w-8,BLR.y+BLR.h-wT-4);
  const t=Date.now()/1000;
  X.strokeStyle='rgba(80,130,200,.3)';X.lineWidth=1;X.beginPath();
  for(let xx=BLR.x+6;xx<BLR.x+BLR.w-6;xx+=2){const yy=wT+Math.sin(xx*.06+t*2.5)*2.5;xx===BLR.x+6?X.moveTo(xx,yy):X.lineTo(xx,yy);}
  X.stroke();
  // Hot steam/air above the water (red/orange, clearly visible)
  const steamGrad=X.createLinearGradient(0,BLR.y+4,0,wT);
  steamGrad.addColorStop(0,'rgba(230,70,20,.2)');
  steamGrad.addColorStop(1,'rgba(230,70,20,.06)');
  X.fillStyle=steamGrad;
  X.fillRect(BLR.x+4,BLR.y+4,BLR.w-8,wT-BLR.y-4);
  // Red/orange dots above water showing hot gas
  for(let i=0;i<15;i++){
    const sx=BLR.x+10+Math.random()*(BLR.w-20);
    const sy=BLR.y+8+Math.random()*(wT-BLR.y-14);
    const sr=2+Math.random()*3;
    X.fillStyle=`rgba(230,${60+Math.random()*40|0},${15+Math.random()*20|0},${.08+Math.random()*.12})`;
    X.beginPath();X.arc(sx,sy,sr,0,Math.PI*2);X.fill();
    // Glow
    X.fillStyle=`rgba(255,100,30,${.03+Math.random()*.04})`;
    X.beginPath();X.arc(sx,sy,sr+3,0,Math.PI*2);X.fill();
  }
  // Violently boiling water — large bubbles bursting at surface
  for(let i=0;i<15;i++){
    const bx=BLR.x+12+Math.random()*(BLR.w-24);
    const by=wT+5+Math.random()*(BLR.y+BLR.h-wT-14);
    const br=2+Math.random()*5;
    const ba=.12+.18*Math.sin(t*5+i*1.3);
    X.beginPath();X.arc(bx,by+Math.sin(t*4+i*2.3)*5,br,0,Math.PI*2);
    X.strokeStyle=`rgba(120,170,230,${ba})`;X.lineWidth=1.5;X.stroke();
  }
  // Bursting bubbles at the water surface
  for(let i=0;i<6;i++){
    const bx=BLR.x+15+Math.random()*(BLR.w-30);
    const br=3+Math.random()*5;
    const phase=Math.sin(t*3+i*1.7);
    const ba=Math.max(0,phase)*.3;
    X.beginPath();X.arc(bx,wT+Math.sin(t*2.5+i)*2,br,0,Math.PI*2);
    X.strokeStyle=`rgba(180,210,250,${ba})`;X.lineWidth=1.5;X.stroke();
    // Splash effect
    if(phase>0.7){
      X.fillStyle=`rgba(160,200,240,${(phase-.7)*0.4})`;
      X.beginPath();X.arc(bx-3,wT-2,1.5,0,Math.PI*2);X.fill();
      X.beginPath();X.arc(bx+4,wT-3,1,0,Math.PI*2);X.fill();
    }
  }
  for(let yy=BLR.y+18;yy<BLR.y+BLR.h;yy+=30){rivet(BLR.x+10,yy);rivet(BLR.x+BLR.w-10,yy);}
  label('Boiler',BLR.x+BLR.w/2,BLR.y-12,14);
  // thermometer
  const tx=BLR.x-18,ty=BLR.y+25,th=BLR.h-50;
  X.fillStyle='#555';X.fillRect(tx-3,ty,8,th);
  const tg=X.createLinearGradient(0,ty+th,0,ty);tg.addColorStop(0,'#c33');tg.addColorStop(.5,'#c6c');tg.addColorStop(1,'#33c');
  X.fillStyle=tg;X.fillRect(tx-1,ty+2,4,th-4);
  X.beginPath();X.arc(tx+1,ty+th+6,6,0,Math.PI*2);X.fillStyle='#c33';X.fill();
  X.beginPath();X.arc(tx+1,ty-4,5,0,Math.PI*2);X.fillStyle='#33c';X.fill();
}

function drawHeatArrows(){
  const t=Date.now()/1000;
  for(let i=0;i<3;i++){const x=FRN.x+25+i*45,a=.3+.2*Math.sin(t*2+i);
    X.fillStyle=X.strokeStyle=`rgba(255,70,20,${a})`;X.lineWidth=2;
    X.beginPath();X.moveTo(x,FRN.y-5);X.lineTo(x,BLR.y+BLR.h+5);X.stroke();
    X.beginPath();X.moveTo(x,FRN.y-5);X.lineTo(x-5,FRN.y+5);X.lineTo(x+5,FRN.y+5);X.closePath();X.fill();}
}

function drawExternalPipes(){
  // Steam: boiler → valve box left side
  X.strokeStyle='#6a6a6a';X.lineWidth=16;X.lineCap='round';X.lineJoin='round';
  X.beginPath();X.moveTo(BLR.x+BLR.w/2+10,BLR.y);X.lineTo(BLR.x+BLR.w/2+10,BLR.y-50);
  X.lineTo(VB.x-3,BLR.y-50);X.lineTo(VB.x-3,VB.y+VB.h/2);X.stroke();
  X.strokeStyle='#888';X.lineWidth=8;
  X.beginPath();X.moveTo(BLR.x+BLR.w/2+10,BLR.y);X.lineTo(BLR.x+BLR.w/2+10,BLR.y-50);
  X.lineTo(VB.x-3,BLR.y-50);X.lineTo(VB.x-3,VB.y+VB.h/2);X.stroke();
  // animated flow
  const ft=Date.now()/400;
  X.setLineDash([6,8]);X.lineDashOffset=-ft*8;X.strokeStyle='rgba(230,90,30,.18)';X.lineWidth=4;
  X.beginPath();X.moveTo(BLR.x+BLR.w/2+10,BLR.y);X.lineTo(BLR.x+BLR.w/2+10,BLR.y-50);
  X.lineTo(VB.x-3,BLR.y-50);X.lineTo(VB.x-3,VB.y+VB.h/2);X.stroke();X.setLineDash([]);
  // safety valve
  const svx=(BLR.x+BLR.w/2+10+VB.x)/2,svy=BLR.y-50;
  X.fillStyle='#888';X.beginPath();X.arc(svx,svy,11,0,Math.PI*2);X.fill();
  X.strokeStyle='#aaa';X.lineWidth=1;X.stroke();
  X.fillStyle='#c44';X.beginPath();X.arc(svx,svy,5,0,Math.PI*2);X.fill();
  label('Safety valve',svx,svy-16,11);
  // (Exhaust chimney is now drawn as part of the engine assembly, not here)
}

// ═══════════════════════════════════════
// THE ENGINE ASSEMBLY
// Everything physically connected
// ═══════════════════════════════════════
function drawEngine(a){
  const vo=valveOffset(a);
  const pf=pistonFaceX(a);
  const chX=crossheadX(a);

  // Valve state: when slider bridges left port to exhaust, right is open (intake)
  // vo < -10 → slider on left side → LEFT port to exhaust, RIGHT port open
  // vo > 10  → slider on right side → RIGHT port to exhaust, LEFT port open
  const leftExh=vo<-10, rightExh=vo>10;
  const leftOpen=vo>10, rightOpen=vo<-10;

  // ─── 1. CYLINDER BODY ───
  X.fillStyle=mGrad(CYL.x,CYL.x+CYL.w,'#555','#727272');
  X.strokeStyle='#999';X.lineWidth=2.5;
  rr(CYL.x,CYL.y,CYL.w,CYL.h,6,true,true);

  // ─── 2. ANGLED PIPES from cylinder to valve box ───
  const pw=VPIPE_L.w;
  // Left pipe
  X.fillStyle='#666';
  X.beginPath();
  X.moveTo(VPIPE_L.botCx-pw/2,CYL.y);X.lineTo(VPIPE_L.topCx-pw/2,VB_BOT);
  X.lineTo(VPIPE_L.topCx+pw/2,VB_BOT);X.lineTo(VPIPE_L.botCx+pw/2,CYL.y);
  X.closePath();X.fill();X.strokeStyle='#999';X.lineWidth=1.5;X.stroke();
  X.fillStyle='#2a2a2a';
  X.beginPath();
  X.moveTo(VPIPE_L.botCx-pw/2+4,CYL.y);X.lineTo(VPIPE_L.topCx-pw/2+4,VB_BOT+2);
  X.lineTo(VPIPE_L.topCx+pw/2-4,VB_BOT+2);X.lineTo(VPIPE_L.botCx+pw/2-4,CYL.y);
  X.closePath();X.fill();
  // Right pipe
  X.fillStyle='#666';
  X.beginPath();
  X.moveTo(VPIPE_R.botCx-pw/2,CYL.y);X.lineTo(VPIPE_R.topCx-pw/2,VB_BOT);
  X.lineTo(VPIPE_R.topCx+pw/2,VB_BOT);X.lineTo(VPIPE_R.botCx+pw/2,CYL.y);
  X.closePath();X.fill();X.strokeStyle='#999';X.lineWidth=1.5;X.stroke();
  X.fillStyle='#2a2a2a';
  X.beginPath();
  X.moveTo(VPIPE_R.botCx-pw/2+4,CYL.y);X.lineTo(VPIPE_R.topCx-pw/2+4,VB_BOT+2);
  X.lineTo(VPIPE_R.topCx+pw/2-4,VB_BOT+2);X.lineTo(VPIPE_R.botCx+pw/2-4,CYL.y);
  X.closePath();X.fill();

  // Color pipe bores based on flow
  if(leftOpen){
    X.fillStyle='rgba(230,70,20,.22)';
    X.beginPath();X.moveTo(VPIPE_L.botCx-pw/2+5,CYL.y);X.lineTo(VPIPE_L.topCx-pw/2+5,VB_BOT+3);
    X.lineTo(VPIPE_L.topCx+pw/2-5,VB_BOT+3);X.lineTo(VPIPE_L.botCx+pw/2-5,CYL.y);X.closePath();X.fill();
  }
  if(leftExh){
    X.fillStyle='rgba(90,110,160,.18)';
    X.beginPath();X.moveTo(VPIPE_L.botCx-pw/2+5,CYL.y);X.lineTo(VPIPE_L.topCx-pw/2+5,VB_BOT+3);
    X.lineTo(VPIPE_L.topCx+pw/2-5,VB_BOT+3);X.lineTo(VPIPE_L.botCx+pw/2-5,CYL.y);X.closePath();X.fill();
  }
  if(rightOpen){
    X.fillStyle='rgba(230,70,20,.22)';
    X.beginPath();X.moveTo(VPIPE_R.botCx-pw/2+5,CYL.y);X.lineTo(VPIPE_R.topCx-pw/2+5,VB_BOT+3);
    X.lineTo(VPIPE_R.topCx+pw/2-5,VB_BOT+3);X.lineTo(VPIPE_R.botCx+pw/2-5,CYL.y);X.closePath();X.fill();
  }
  if(rightExh){
    X.fillStyle='rgba(90,110,160,.18)';
    X.beginPath();X.moveTo(VPIPE_R.botCx-pw/2+5,CYL.y);X.lineTo(VPIPE_R.topCx-pw/2+5,VB_BOT+3);
    X.lineTo(VPIPE_R.topCx+pw/2-5,VB_BOT+3);X.lineTo(VPIPE_R.botCx+pw/2-5,CYL.y);X.closePath();X.fill();
  }

  // ─── 3. THREE SEPARATE COMPARTMENTS ───
  //
  //  1) EXHAUST PIPE — separate, on top, connects to chimney
  //  2) SLIDING COMPARTMENT — middle box, filled with hot steam from boiler.
  //     Has three holes in its floor: LP, center(exhaust), RP.
  //     The SLIDER with its U-TUBE slides inside here.
  //  3) PISTON COMPARTMENT — the cylinder below (drawn separately)
  //
  //  The exhaust pipe connects to the sliding compartment through
  //  the center hole. The slider's U-tube bridges one port hole
  //  to the center exhaust hole. The other port is open to the
  //  steam-filled sliding compartment.

  const exX_out=EX_PIPE_X;
  const exhPW=16;

  // ── A. EXHAUST PIPE (separate, exits to the SIDE from between compartments) ──
  // From the center floor hole, a horizontal connector goes RIGHT,
  // in the gap between the sliding compartment and the cylinder pipes.
  // Then a vertical pipe goes UP to the chimney.
  // The exhaust never passes through the cylinder.
  //
  // Path: center floor hole → right (horizontal) → up to chimney

  // Exhaust connector below the sliding compartment
  const exhConnY = VB_BOT + 15;
  const riseBot = exhConnY + exhPW + 3;
  const riseTop = 60;
  const exhW=exhPW; // bore width
  const wallT=3;    // wall thickness

  // Step 1: Draw ALL outer walls (one continuous shape, no internal lines)
  X.fillStyle='#484c50';
  // Vertical stub
  X.fillRect(PORT_EX_CX-exhW/2-wallT, VB_BOT, exhW+2*wallT, exhConnY+exhW+2*wallT-VB_BOT);
  // Horizontal connector
  X.fillRect(PORT_EX_CX-exhW/2-wallT, exhConnY, exX_out+exhW/2+wallT-PORT_EX_CX+exhW/2+wallT, exhW+2*wallT);
  // Vertical chimney rise
  X.fillRect(exX_out-exhW/2-wallT, riseTop, exhW+2*wallT, riseBot-riseTop);

  // Step 2: Draw ALL inner bores ON TOP (covers joint lines)
  X.fillStyle='#1e1e24';
  // Stub bore
  X.fillRect(PORT_EX_CX-exhW/2, VB_BOT, exhW, exhConnY+wallT-VB_BOT);
  // Horizontal bore (extends to cover the corner)
  X.fillRect(PORT_EX_CX-exhW/2, exhConnY+wallT, exX_out+exhW/2-PORT_EX_CX+exhW/2, exhW);
  // Chimney bore (extends down to cover the corner)
  X.fillRect(exX_out-exhW/2, exhConnY+wallT, exhW, riseBot-exhConnY-wallT);
  // Chimney bore upper part
  X.fillRect(exX_out-exhW/2, riseTop, exhW, exhConnY+wallT-riseTop);

  // Exhaust flow color
  if(leftExh||rightExh){
    X.fillStyle='rgba(90,110,160,.07)';
    X.fillRect(PORT_EX_CX-exhW/2, VB_BOT, exhW, exhConnY+wallT-VB_BOT);
    X.fillRect(PORT_EX_CX-exhW/2, exhConnY+wallT, exX_out+exhW/2-PORT_EX_CX+exhW/2, exhW);
    X.fillRect(exX_out-exhW/2, riseTop, exhW, riseBot-riseTop);
  }

  // Chimney cap
  X.fillStyle='#5a5a5a';
  rr(exX_out-exhW/2-8,riseTop-6,exhW+16,10,3,true,false);
  X.strokeStyle='#888';X.lineWidth=1.5;
  rr(exX_out-exhW/2-8,riseTop-6,exhW+16,10,3,false,true);

  // Label
  X.fillStyle='rgba(90,110,160,.5)';X.font='9px Georgia';X.textAlign='center';
  X.fillText('EXHAUST',exX_out,riseTop+20);

  // ── B. SLIDING COMPARTMENT (middle box — filled with hot steam) ──
  // This is where the slider lives. Hot steam from the boiler fills this.
  // Three holes in the floor connect down to the cylinder pipes.
  X.fillStyle=mGrad(VB.x,VB.x+VB.w,'#555','#727272');
  X.strokeStyle='#999';X.lineWidth=2;
  rr(VB.x,VB.y,VB.w,VB.h,5,true,true);
  // Interior: entire compartment filled uniformly with hot red gas
  X.fillStyle='#2e2e2e';
  X.fillRect(VB.x+5,VB.y+5,VB.w-10,VB.h-10);
  X.fillStyle='rgba(230,70,20,.1)';
  X.fillRect(VB.x+5,VB.y+5,VB.w-10,VB.h-10);
  for(let i=0;i<7;i++){
    const sx=VB.x+12+Math.random()*(VB.w-24);
    const sy=VB.y+8+Math.random()*(VB.h-20);
    X.fillStyle=`rgba(230,80,25,${.03+Math.random()*.05})`;
    X.beginPath();X.arc(sx,sy,2+Math.random()*3,0,Math.PI*2);X.fill();
  }
  // Steam inlet on left wall (from boiler)
  X.fillStyle='rgba(230,70,20,.3)';X.fillRect(VB.x,VB.y+VB.h/2-8,5,16);
  // (exhaust connects through the FLOOR center hole, not the top)
  X.fillStyle='rgba(230,100,40,.25)';X.font='8px Georgia';X.textAlign='center';
  X.fillText('STEAM',VB.x+40,VB.y+15);
  X.fillText('(hot)',VB.x+40,VB.y+25);

  // Floor of sliding compartment (thin, part of the wall)
  X.fillStyle='#555';
  X.fillRect(VB.x+3,VB_BOT-3,VB.w-6,3);
  // Three holes in the floor
  X.fillStyle='#2a2a2a';
  X.fillRect(PORT_L_CX-PORT_W/2, VB_BOT-3, PORT_W, 3);
  X.fillRect(PORT_EX_CX-PORT_W/2, VB_BOT-3, PORT_W, 3);
  X.fillRect(PORT_R_CX-PORT_W/2, VB_BOT-3, PORT_W, 3);

  // ── C. THE SLIDER WITH U-TUBE ──
  // The slider is a block that slides left-right inside the compartment.
  // It contains a small U-SHAPED TUBE.
  // The U-tube has two openings on the bottom that straddle two adjacent holes.
  // As the slider moves:
  //   - U-tube connects LEFT hole ↔ CENTER hole (left exhausts)
  //   - OR U-tube connects RIGHT hole ↔ CENTER hole (right exhausts)

  const t01=(vo/VALVE_TRAVEL+1)/2; // 0=left, 1=right
  // Slider block — BIGGER, fills most of the compartment height
  const sliderW=PORT_R_CX-PORT_L_CX+PORT_W+20;
  const slH=45;
  const slY=VB_BOT-6-slH-2;
  const slCx=PORT_EX_CX + vo*0.7;
  const sliderL=slCx-sliderW/2;

  // Slider block body
  X.fillStyle=mGrad(sliderL,sliderL+sliderW,'#5a5e62','#80858a');
  rr(sliderL,slY,sliderW,slH,4,true,false);
  X.strokeStyle='#aaa';X.lineWidth=1.5;
  rr(sliderL,slY,sliderW,slH,4,false,true);

  // U-TUBE inside the slider
  // Openings match the port hole width (PORT_W)
  const uSpan=PORT_EX_CX-PORT_L_CX; // distance between LP and center
  const uLeftCx=slCx-uSpan/2;
  const uRightCx=slCx+uSpan/2;
  const uW=exhPW; // same width as the exhaust pipe
  const uLegH=slH-8;
  const uBotY=slY+slH; // bottom of U legs (align with floor holes)
  const uTopY=slY+6;   // top of U curve

  // Update global slider bounds for molecule culling
  curSliderL=sliderL; curSliderR=sliderL+sliderW;
  curSliderTop=slY; curSliderBot=slY+slH;
  curULeftCx=uLeftCx; curURightCx=uRightCx; curUW=uW;

  // Draw U-tube: two vertical legs + horizontal connector at top
  // Left leg
  X.fillStyle='rgba(90,110,160,.2)';
  X.fillRect(uLeftCx-uW/2, uTopY+uW/2, uW, uBotY-uTopY-uW/2);
  // Right leg
  X.fillRect(uRightCx-uW/2, uTopY+uW/2, uW, uBotY-uTopY-uW/2);
  // Horizontal connector at top
  X.fillRect(uLeftCx-uW/2, uTopY, uRightCx-uLeftCx+uW, uW);
  // U-tube walls (outline)
  X.strokeStyle='rgba(140,155,180,.6)';X.lineWidth=1.5;
  X.beginPath();
  // Outer path of U
  X.moveTo(uLeftCx-uW/2, uBotY);
  X.lineTo(uLeftCx-uW/2, uTopY);
  X.lineTo(uRightCx+uW/2, uTopY);
  X.lineTo(uRightCx+uW/2, uBotY);
  X.stroke();
  // Inner path of U
  X.beginPath();
  X.moveTo(uLeftCx+uW/2, uBotY);
  X.lineTo(uLeftCx+uW/2, uTopY+uW);
  X.lineTo(uRightCx-uW/2, uTopY+uW);
  X.lineTo(uRightCx-uW/2, uBotY);
  X.stroke();

  // Color U-tube bore when exhaust flowing
  if(leftExh||rightExh){
    X.fillStyle='rgba(90,110,160,.12)';
    X.fillRect(uLeftCx-uW/2+2, uTopY+2, uRightCx-uLeftCx+uW-4, uW-2);
    X.fillRect(uLeftCx-uW/2+2, uTopY+uW, uW-4, uBotY-uTopY-uW);
    X.fillRect(uRightCx-uW/2+2, uTopY+uW, uW-4, uBotY-uTopY-uW);
  }

  // ── Eccentric linkage (same principle as piston-flywheel connection) ──
  // Eccentric pin on flywheel → rigid connecting rod → valve crosshead → rigid push rod → slider
  // Two fixed-length rods with a hinge between them, so nothing stretches.

  const ECC_R=20;
  const eccX=FW.cx+ECC_R*Math.cos(a+Math.PI*0.5);
  const eccY=FW.cy+ECC_R*Math.sin(a+Math.PI*0.5);

  // Valve crosshead: moves horizontally at a fixed Y between the slider and flywheel
  const vchY = CYL.y + 20; // fixed Y for the valve crosshead (near cylinder top)
  const ECC_ROD = 250; // connecting rod length (eccentric pin to valve crosshead)
  // Compute crosshead X from eccentric pin (same math as piston crosshead)
  const vchDy = eccY - vchY;
  const vchX = eccX - Math.sqrt(Math.max(1, ECC_ROD*ECC_ROD - vchDy*vchDy));

  // Push rod: from valve crosshead to slider (rigid, fixed length)
  // Attach eccentric rod to RIGHT side of slider (so it doesn't block the view)
  const sliderMidX = sliderL + sliderW - 8;
  const sliderMidY = slY + slH/2;

  // Draw connecting rod: eccentric pin → valve crosshead
  X.strokeStyle='#8a8a8a';X.lineWidth=5;
  X.beginPath();X.moveTo(eccX,eccY);X.lineTo(vchX,vchY);X.stroke();
  X.strokeStyle='#aaa';X.lineWidth=2;
  X.beginPath();X.moveTo(eccX,eccY-2);X.lineTo(vchX,vchY-2);X.stroke();

  // Valve crosshead pin
  X.beginPath();X.arc(vchX,vchY,5,0,Math.PI*2);X.fillStyle='#bbb';X.fill();
  X.strokeStyle='#888';X.lineWidth=1;X.stroke();

  // Draw push rod: valve crosshead → slider
  X.strokeStyle='#8a8a8a';X.lineWidth=4;
  X.beginPath();X.moveTo(vchX,vchY);X.lineTo(sliderMidX,sliderMidY);X.stroke();
  X.strokeStyle='#aaa';X.lineWidth=1.5;
  X.beginPath();X.moveTo(vchX,vchY-1);X.lineTo(sliderMidX,sliderMidY-1);X.stroke();

  // Pin at slider end
  X.beginPath();X.arc(sliderMidX,sliderMidY,4,0,Math.PI*2);X.fillStyle='#bbb';X.fill();
  // Eccentric pin
  X.beginPath();X.arc(eccX,eccY,5,0,Math.PI*2);X.fillStyle='#ccc';X.fill();
  X.strokeStyle='#888';X.lineWidth=1;X.stroke();

  // Port glow
  if(leftOpen){X.fillStyle='rgba(230,70,20,.25)';X.fillRect(PORT_L_CX-PORT_W/2,VB_BOT-3,PORT_W,3);}
  if(rightOpen){X.fillStyle='rgba(230,70,20,.25)';X.fillRect(PORT_R_CX-PORT_W/2,VB_BOT-3,PORT_W,3);}
  if(leftExh){X.fillStyle='rgba(90,110,160,.25)';X.fillRect(PORT_L_CX-PORT_W/2,VB_BOT-3,PORT_W,3);}
  if(rightExh){X.fillStyle='rgba(90,110,160,.25)';X.fillRect(PORT_R_CX-PORT_W/2,VB_BOT-3,PORT_W,3);}

  label('Sliding valve',slCx,slY-6,10);

  // ─── 6. CYLINDER BORE + GAS (always present, color transitions smoothly) ───
  X.fillStyle='#2a2a2a';X.fillRect(BORE.x,BORE.y,BORE.w,BORE.h);
  X.fillStyle='#2a2a2a';
  X.fillRect(CYLPORT_L.cx-CYLPORT_L.w/2,CYL.y,CYLPORT_L.w,WALL);
  X.fillRect(CYLPORT_R.cx-CYLPORT_R.w/2,CYL.y,CYLPORT_R.w,WALL);

  // Gas temperature for each side: smooth 0..1 (0=cold/blue, 1=hot/red)
  // Uses the valve offset normalized to 0..1
  // When leftOpen (vo>0): left is hot, right is cold
  // When rightOpen (vo<0): right is hot, left is cold
  // Smooth transition through the cycle
  const voNorm=Math.max(-1,Math.min(1,vo/VALVE_TRAVEL)); // -1 to +1
  const leftTemp=Math.max(0,Math.min(1,(voNorm+1)/2));   // 0 when vo=-35, 1 when vo=+35
  const rightTemp=1-leftTemp;                              // opposite

  // Draw gas in each chamber — ALWAYS visible, never disappears
  function drawChamberGas(x,w,temp){
    if(w<3) return;
    // Blend between hot red and cold blue
    const r=Math.round(90+140*temp);
    const g2=Math.round(110-40*temp);
    const b=Math.round(160-140*temp);
    // Strong solid fill — always clearly visible
    const alpha=0.2+temp*0.15;
    X.fillStyle=`rgba(${r},${g2},${b},${alpha})`;
    X.fillRect(x,BORE.y,w,BORE.h);
    // Second layer for more intensity
    X.fillStyle=`rgba(${r},${g2},${b},${alpha*0.5})`;
    X.fillRect(x+2,BORE.y+2,w-4,BORE.h-4);
    // Dense particles — lots of them, always present
    const np=Math.max(8,w/5|0);
    for(let i=0;i<np;i++){
      const gx=x+3+Math.random()*(w-6),gy=BORE.y+3+Math.random()*(BORE.h-6);
      const pr=Math.min(255,r+Math.random()*30|0);
      const pg2=Math.max(0,g2+Math.random()*20|0);
      const pb=Math.max(0,b+Math.random()*20|0);
      const pa=0.1+temp*0.12+Math.random()*0.06;
      X.fillStyle=`rgba(${pr},${pg2},${pb},${pa})`;
      X.beginPath();X.arc(gx,gy,1.5+Math.random()*2.5,0,Math.PI*2);X.fill();
    }
  }

  const lW=pf-BORE.x;
  const rStart=pf+PW, rW=BORE.x+BORE.w-rStart;
  drawChamberGas(BORE.x, lW, leftTemp);
  drawChamberGas(rStart, rW, rightTemp);

  // Piston
  let pg=X.createLinearGradient(pf,BORE.y,pf,BORE.y+BORE.h);
  pg.addColorStop(0,'#aaa');pg.addColorStop(.35,'#ccc');pg.addColorStop(.65,'#ccc');pg.addColorStop(1,'#aaa');
  X.fillStyle=pg;X.fillRect(pf,BORE.y,PW,BORE.h);
  X.strokeStyle='#ddd';X.lineWidth=1;X.strokeRect(pf,BORE.y,PW,BORE.h);
  X.strokeStyle='#888';X.lineWidth=1.5;
  X.beginPath();X.moveTo(pf+3,BORE.y);X.lineTo(pf+3,BORE.y+BORE.h);X.stroke();
  X.beginPath();X.moveTo(pf+PW-3,BORE.y);X.lineTo(pf+PW-3,BORE.y+BORE.h);X.stroke();

  // Piston rod
  const rodY=495;
  X.strokeStyle='#bbb';X.lineWidth=8;
  X.beginPath();X.moveTo(pf+PW,rodY);X.lineTo(chX,rodY);X.stroke();
  X.strokeStyle='#d5d5d5';X.lineWidth=2;
  X.beginPath();X.moveTo(pf+PW,rodY-3);X.lineTo(chX,rodY-3);X.stroke();
  // Stuffing box
  X.fillStyle='#6a6a6a';X.fillRect(CYL.x+CYL.w-5,rodY-16,14,32);
  X.strokeStyle='#888';X.lineWidth=1;X.strokeRect(CYL.x+CYL.w-5,rodY-16,14,32);

  // ─── 7. MOLECULE SWARMS ───
  const pipeMidLY=(VB_BOT+CYL.y)/2;
  const pipeMidLX=(VPIPE_L.topCx+VPIPE_L.botCx)/2;
  const pipeMidRY=(VB_BOT+CYL.y)/2;
  const pipeMidRX=(VPIPE_R.topCx+VPIPE_R.botCx)/2;

  const supplyPath=[
    {x:BLR.x+BLR.w/2+10,y:BLR.y},
    {x:BLR.x+BLR.w/2+10,y:BLR.y-50},
    {x:VB.x-3,y:BLR.y-50},
    {x:VB.x-3,y:VB.y+VB.h/2},
    {x:VB.x+15,y:VB.y+VB.h/2}
  ];

  // Hot molecules in supply pipe (boiler → compartment)
  if(run&&Math.random()<.5) spawnMolecule(supplyPath,HOT,100,true);

  // Hot molecules FILLING the compartment — only in areas not blocked by slider
  if(run&&Math.random()<.8){
    // Spawn above the slider (safe area)
    const ry=VB.y+10+Math.random()*(slY-VB.y-15);
    const ry2=VB.y+10+Math.random()*(slY-VB.y-15);
    // X: avoid the slider's horizontal range
    let rx,rx2;
    if(Math.random()<.5){
      // Left of slider
      rx=VB.x+10+Math.random()*Math.max(5,sliderL-VB.x-15);
      rx2=VB.x+10+Math.random()*Math.max(5,sliderL-VB.x-15);
    } else {
      // Right of slider
      const sr=sliderL+sliderW;
      rx=sr+5+Math.random()*Math.max(5,VB.x+VB.w-sr-15);
      rx2=sr+5+Math.random()*Math.max(5,VB.x+VB.w-sr-15);
    }
    spawnMolecule([{x:rx,y:ry},{x:rx2,y:ry2}],HOT,40,true);
  }

  // Hot intake: only spawn molecules when the port is OUTSIDE the slider body.
  // Check that the port X is not between sliderL and sliderL+sliderW.
  const sliderRight = sliderL + sliderW;
  const leftPortClear = PORT_L_CX < sliderL || PORT_L_CX > sliderRight;
  const rightPortClear = PORT_R_CX < sliderL || PORT_R_CX > sliderRight;

  if(leftOpen && leftPortClear && run){
    if(Math.random()<.8) spawnMolecule([
      {x:PORT_L_CX,y:VB_BOT},
      {x:VPIPE_L.topCx,y:VB_BOT+5},{x:pipeMidLX,y:pipeMidLY},
      {x:VPIPE_L.botCx,y:CYL.y},{x:CYLPORT_L.cx,y:BORE.y+BORE.h/2}
    ],HOT,250,true);
    if(Math.random()<.3) spawnMolecule([
      {x:VB.x+20,y:VB.y+20},{x:PORT_L_CX,y:slY+slH+2},
      {x:PORT_L_CX,y:VB_BOT},
      {x:VPIPE_L.topCx,y:VB_BOT+5},{x:pipeMidLX,y:pipeMidLY},
      {x:VPIPE_L.botCx,y:CYL.y},{x:CYLPORT_L.cx,y:BORE.y+BORE.h/2}
    ],HOT,150,true);
  }
  if(rightOpen && rightPortClear && run){
    if(Math.random()<.8) spawnMolecule([
      {x:PORT_R_CX,y:VB_BOT},
      {x:VPIPE_R.topCx,y:VB_BOT+5},{x:pipeMidRX,y:pipeMidRY},
      {x:VPIPE_R.botCx,y:CYL.y},{x:CYLPORT_R.cx,y:BORE.y+BORE.h/2}
    ],HOT,250,true);
    if(Math.random()<.3) spawnMolecule([
      {x:VB.x+VB.w-20,y:VB.y+20},{x:PORT_R_CX,y:slY+slH+2},
      {x:PORT_R_CX,y:VB_BOT},
      {x:VPIPE_R.topCx,y:VB_BOT+5},{x:pipeMidRX,y:pipeMidRY},
      {x:VPIPE_R.botCx,y:CYL.y},{x:CYLPORT_R.cx,y:BORE.y+BORE.h/2}
    ],HOT,150,true);
  }

  // Exhaust molecules: TWO separate segments to avoid crossing slider walls.
  //
  // Segment 1: cylinder → pipe → up to the floor hole (BELOW the slider)
  //   These are in the pipes, never touch the slider.
  //
  // Segment 2: inside the U-tube only → exhaust connector → chimney
  //   These start inside the U-tube (which is inside the slider)
  //   and travel through the tube to the exhaust.
  //
  // This way no molecule ever crosses the slider wall.

  // Also check that the U-tube legs are actually over the right holes
  const leftLegAligned = Math.abs(uLeftCx - PORT_L_CX) < PORT_W;
  const rightLegAligned = Math.abs(uRightCx - PORT_R_CX) < PORT_W;
  const exhLegAligned = leftExh ?
    (Math.abs(uRightCx - PORT_EX_CX) < PORT_W) :
    (Math.abs(uLeftCx - PORT_EX_CX) < PORT_W);

  if(leftExh && leftLegAligned && exhLegAligned && run){
    // Segment 1: cylinder up to just below the floor (in the pipe, outside slider)
    if(Math.random()<.4) spawnMolecule([
      {x:CYLPORT_L.cx,y:BORE.y+BORE.h/2},{x:CYLPORT_L.cx,y:CYL.y},
      {x:VPIPE_L.botCx,y:CYL.y},{x:pipeMidLX,y:pipeMidLY},
      {x:VPIPE_L.topCx,y:VB_BOT+3}
    ],COLD,120,false);
    // Segment 2: inside U-tube → exhaust (starts inside the tube, never outside)
    if(Math.random()<.35) spawnMolecule([
      {x:uLeftCx,y:uBotY-2},
      {x:uLeftCx,y:uTopY+uW},
      {x:(uLeftCx+uRightCx)/2,y:uTopY+uW/2},
      {x:uRightCx,y:uTopY+uW},
      {x:uRightCx,y:uBotY-2},
      {x:PORT_EX_CX,y:VB_BOT+3},
      {x:PORT_EX_CX,y:exhConnY+exhPW/2+3},
      {x:exX_out,y:exhConnY+exhPW/2+3},
      {x:exX_out,y:riseTop+20}
    ],COLD,180,false);
  }
  if(rightExh && rightLegAligned && exhLegAligned && run){
    if(Math.random()<.4) spawnMolecule([
      {x:CYLPORT_R.cx,y:BORE.y+BORE.h/2},{x:CYLPORT_R.cx,y:CYL.y},
      {x:VPIPE_R.botCx,y:CYL.y},{x:pipeMidRX,y:pipeMidRY},
      {x:VPIPE_R.topCx,y:VB_BOT+3}
    ],COLD,120,false);
    if(Math.random()<.35) spawnMolecule([
      {x:uRightCx,y:uBotY-2},
      {x:uRightCx,y:uTopY+uW},
      {x:(uLeftCx+uRightCx)/2,y:uTopY+uW/2},
      {x:uLeftCx,y:uTopY+uW},
      {x:uLeftCx,y:uBotY-2},
      {x:PORT_EX_CX,y:VB_BOT+3},
      {x:PORT_EX_CX,y:exhConnY+exhPW/2+3},
      {x:exX_out,y:exhConnY+exhPW/2+3},
      {x:exX_out,y:riseTop+20}
    ],COLD,180,false);
  }

  label('Piston',pf+PW/2,CYL.y+CYL.h+18,12);
  for(let yy=CYL.y+15;yy<CYL.y+CYL.h;yy+=22){rivet(CYL.x+6,yy);rivet(CYL.x+CYL.w-6,yy);}

  return chX;
}

// ─── CROSSHEAD + CONNECTING ROD + FLYWHEEL ───
function drawMechanics(chX){
  const rodY=495;
  // Crosshead
  X.fillStyle='#555';X.fillRect(chX-5,rodY-20,45,5);X.fillRect(chX-5,rodY+15,45,5);
  X.fillStyle='#999';rr(chX,rodY-14,18,28,3,true,false);
  X.strokeStyle='#bbb';X.lineWidth=1;rr(chX,rodY-14,18,28,3,false,true);
  X.beginPath();X.arc(chX+9,rodY,5,0,Math.PI*2);X.fillStyle='#ccc';X.fill();
  // Connecting rod
  const cp=crankPin(ang);
  X.strokeStyle='#8a8a8a';X.lineWidth=9;X.beginPath();X.moveTo(chX+9,rodY);X.lineTo(cp.x,cp.y);X.stroke();
  X.strokeStyle='#aaa';X.lineWidth=3;X.beginPath();X.moveTo(chX+9,rodY-3);X.lineTo(cp.x,cp.y-3);X.stroke();
  X.beginPath();X.arc(cp.x,cp.y,7,0,Math.PI*2);X.fillStyle='#999';X.fill();X.strokeStyle='#bbb';X.lineWidth=1;X.stroke();
}

function drawFlywheel(){
  const cx=FW.cx,cy=FW.cy,r=FW.r;
  X.beginPath();X.arc(cx+4,cy+4,r+8,0,Math.PI*2);X.fillStyle='rgba(0,0,0,.25)';X.fill();
  X.beginPath();X.arc(cx,cy,r,0,Math.PI*2);X.lineWidth=18;X.strokeStyle='#6a6a6a';X.stroke();
  X.lineWidth=12;X.strokeStyle='#888';X.stroke();
  X.beginPath();X.arc(cx,cy,r-18,0,Math.PI*2);X.lineWidth=2;X.strokeStyle='#555';X.stroke();
  for(let i=0;i<8;i++){
    const sa=ang+(i*Math.PI*2)/8;
    X.beginPath();X.moveTo(cx+20*Math.cos(sa),cy+20*Math.sin(sa));X.lineTo(cx+(r-22)*Math.cos(sa),cy+(r-22)*Math.sin(sa));
    X.lineWidth=6;X.strokeStyle='#777';X.stroke();X.lineWidth=2;X.strokeStyle='#999';X.stroke();
  }
  X.beginPath();X.arc(cx,cy,20,0,Math.PI*2);
  let hg=X.createRadialGradient(cx-4,cy-4,2,cx,cy,20);hg.addColorStop(0,'#bbb');hg.addColorStop(1,'#666');
  X.fillStyle=hg;X.fill();X.strokeStyle='#999';X.lineWidth=2;X.stroke();
  const cp=crankPin(ang);
  X.beginPath();X.arc(cp.x,cp.y,6,0,Math.PI*2);X.fillStyle='#ccc';X.fill();
  // Eccentric disc (smaller circle, 90° offset from crank pin, drives the valve)
  const eccR=20;
  const eccPx=cx+eccR*Math.cos(ang+Math.PI*0.5);
  const eccPy=cy+eccR*Math.sin(ang+Math.PI*0.5);
  X.beginPath();X.arc(eccPx,eccPy,8,0,Math.PI*2);
  X.fillStyle='#aa8844';X.fill();X.strokeStyle='#886633';X.lineWidth=1.5;X.stroke();
  // Eccentric strap (ring around it)
  X.beginPath();X.arc(eccPx,eccPy,11,0,Math.PI*2);
  X.strokeStyle='#997744';X.lineWidth=2;X.stroke();
  // Label eccentric
  X.fillStyle='#aa8844';X.font='8px Georgia';X.textAlign='left';
  X.fillText('eccentric',eccPx+14,eccPy+3);
}

function drawParticles(dt){
  // Chimney smoke from the exhaust pipe top
  if(run&&Math.random()<.25){steamP.push({x:EX_PIPE_X+(Math.random()-.5)*14,y:56,vx:(Math.random()-.5)*18,vy:-(30+Math.random()*40),life:2+Math.random()*2,ml:2+Math.random()*2,sz:2+Math.random()*5});}
  if(run&&Math.random()<.45){fireP.push({x:FRN.x+FRN.w/2+(Math.random()-.5)*80,y:FRN.y+5,vx:(Math.random()-.5)*12,vy:-(25+Math.random()*50),life:.3+Math.random()*.5,ml:.3+Math.random()*.5,sz:2+Math.random()*5});}
  steamP.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=.995;p.vy*=.995;p.life-=dt;p.sz+=dt*4;
    X.beginPath();X.arc(p.x,p.y,p.sz,0,Math.PI*2);X.fillStyle=`rgba(190,190,200,${Math.max(0,p.life/p.ml)*.3})`;X.fill();});
  steamP=steamP.filter(p=>p.life>0);
  fireP.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;p.sz*=.99;const t2=1-p.life/p.ml;
    X.beginPath();X.arc(p.x,p.y,p.sz,0,Math.PI*2);X.fillStyle=`rgba(${255-t2*60|0},${170-t2*140|0},${40-t2*30|0},${Math.max(0,p.life/p.ml)*.75})`;X.fill();});
  fireP=fireP.filter(p=>p.life>0);
}

function drawStatus(){
  const vo=valveOffset(ang);
  const bx=15,by=670,bw=280,bh=100;
  X.fillStyle='rgba(25,25,30,.85)';rr(bx,by,bw,bh,5,true,false);
  X.strokeStyle='#444';X.lineWidth=1;rr(bx,by,bw,bh,5,false,true);
  X.fillStyle='#ccc';X.font='bold 11px Georgia';X.textAlign='left';
  X.fillText('Cycle Status',bx+10,by+18);X.font='10px Georgia';
  const lO=vo>10,rO=vo<-10,lE=vo<-10,rE=vo>10;
  X.fillStyle=lO?'#e84':lE?'#88b':'#888';
  X.fillText('Left:  '+(lO?'INTAKE \u2193 hot steam':lE?'EXHAUST \u2191 spent steam':'transitioning'),bx+10,by+38);
  X.fillStyle=rO?'#e84':rE?'#88b':'#888';
  X.fillText('Right: '+(rO?'INTAKE \u2193 hot steam':rE?'EXHAUST \u2191 spent steam':'transitioning'),bx+10,by+56);
  X.fillStyle='#999';X.fillText('Valve:',bx+10,by+78);
  const barX=bx+55,barW=100;
  X.fillStyle='#333';X.fillRect(barX,by+71,barW,8);
  X.fillStyle='#ccc';X.fillRect(barX+barW/2+vo/VALVE_TRAVEL*barW/2-10,by+70,20,10);
  const deg=((ang*180/Math.PI)%360+360)%360;
  X.fillStyle='#777';X.fillText(`Crank: ${deg.toFixed(0)}\u00B0`,bx+10,by+95);
}

function drawTitle(){
  X.fillStyle='#e0d8c8';X.font='bold 18px Georgia';X.textAlign='center';
  X.fillText('James Watt Steam Engine (1788)',520,30);
  X.font='12px Georgia';X.fillStyle='#888';
  X.fillText('Slider bridges one port to the separate exhaust; the other is open to the steam chest',520,50);
}

// ─── MAIN LOOP ───
let lt=performance.now();
function frame(now){
  const dt=Math.min((now-lt)/1000,.05);lt=now;
  if(run)ang+=dt*Math.PI*2*spd;
  drawBG();
  drawFurnace();
  drawBoiler();
  drawHeatArrows();
  drawExternalPipes();
  const chX=drawEngine(ang);
  drawMechanics(chX);
  drawFlywheel();
  drawParticles(dt);
  updateAndDrawMolecules(dt);
  drawStatus();
  drawTitle();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
